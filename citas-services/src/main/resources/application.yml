server:
  port: 8082

spring:
  application:
    name: citas-service

  datasource:
    url: jdbc:mysql://localhost:3306/db_citas?useSSL=false&serverTimezone=UTC
    username: root
    password:
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: validate # ¡CRÍTICO! Spring NO crea las tablas, Flyway lo hará.
    show-sql: true
    database-platform: org.hibernate.dialect.MySQL8Dialect

  flyway:
    enabled: true
    baseline-on-migrate: true
